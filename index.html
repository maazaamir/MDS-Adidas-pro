<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDS Project 32 | Adidas Pro Bento</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-grid"></div>
<header class="mds-header">
    <div class="header-content">
        <span class="project-num">Project 32</span>
        <h1 class="main-title">3D BENTO <span class="accent-text">SYSTEM</span></h1>
        <p class="sub-text">Interactive Motion Component — GSAP & Glassmorphism 2.0</p>
    </div>
</header>
    <div class="bento-container">
        <div class="bento-item hero">
            <div class="tag">Global Sales</div>
            <h2 class="counter">94.2%</h2>
            <p>Million Units / 2026</p>
        </div>

        <div class="bento-item sm">
            <i class="ri-rfid-line"></i>
            <p>NFC Sync</p>
            <h3>Active</h3>
        </div>

        <div class="bento-item sm">
            <i class="ri-cpu-line"></i>
            <p>Boost Tech</p>
            <h3>v4.0</h3>
        </div>

        <div class="bento-item md">
            <div class="tag">Market Cap</div>
            <h3>+18.4%</h3>
            <p>Real-time analytics active</p>
        </div>

        <div class="bento-item product-card">
            <div class="tag">Exclusive Drop</div>
            <div class="sneaker-wrapper">
                <img src="images/Gemini_Generated_Image_y36btuy36btuy36b-removebg-preview.png" alt="MDS x Adidas 2026" class="sneaker-img">
            </div>
            <div class="product-info">
                <h4>ULTRABOOST MDS</h4>
                <p>$220.00</p>
            </div>
            <div class="card-glow"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
